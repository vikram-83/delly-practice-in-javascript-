<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main {
            background-color: white;
            border: 2px solid purple;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: purple;
        }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 2px solid black;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
        }

        .input-field:focus {
            border-color: purple;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .forgot-password {
            margin: 10px 0;
            font-size: 14px;
        }

        .forgot-password a, .register-link a {
            color: purple;
            text-decoration: none;
        }

        .forgot-password a:hover, .register-link a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            background-color: purple;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #5e005e;
        }

        .register-link {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="main">
        <h2>LOGIN PAGE</h2>
        
        <form action="#" method="POST">
            <input type="email" name="email" placeholder="Email ID" class="input-field" required>
            <input type="password" name="password" placeholder="Password" class="input-field" required>
            
            <div class="checkbox-container">
                <input type="checkbox" id="remember-me" name="remember">
                <label compression for="remember-me">Remember me</label>
            </div>

            <p class="forgot-password"><a href="#">Forgot password?</a></p>
            
            <button type="submit" class="submit-btn">Login</button>
            
            <p class="register-link">Don't have an account? <a href="#">Register</a></p>
        </form>
    </div>

</body>
</html>
